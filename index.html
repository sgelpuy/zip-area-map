<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>우편번호 구역 지도</title>
<style>
  html, body { height: 100%; margin: 0; font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif; }
  #app { display: flex; flex-direction: column; height: 100%; }
  #toolbar {
    display: flex; gap: 8px; align-items: center;
    padding: 10px 14px; background: #1f2937; color: #fff; flex-wrap: wrap;
  }
  #toolbar label { font-size: 14px; }
  #zipInput {
    flex: 1; min-width: 260px; padding: 8px 10px; font-size: 14px;
    border: none; border-radius: 4px;
  }
  #drawBtn, #clearBtn {
    padding: 8px 16px; font-size: 14px; border: none; border-radius: 4px;
    cursor: pointer; color: #fff;
  }
  #drawBtn { background: #2563eb; }
  #drawBtn:hover { background: #1d4ed8; }
  #clearBtn { background: #6b7280; }
  #clearBtn:hover { background: #4b5563; }
  #captureBtn { background: #059669; }
  #captureBtn:hover { background: #047857; }
  #status { font-size: 13px; color: #d1d5db; width: 100%; }
  #status .not-found { color: #fca5a5; }
  #map { flex: 1; position: relative; }
  #legend {
    position: absolute; right: 12px; bottom: 24px; z-index: 10;
    background: rgba(255,255,255,0.95); border-radius: 6px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.3);
    padding: 10px 12px; font-size: 12px; max-width: 260px;
    max-height: 240px; overflow-y: auto; display: none;
  }
  #legend h4 { margin: 0 0 6px; font-size: 12px; color: #374151; }
  #legend .legend-item { display: flex; align-items: flex-start; gap: 6px; padding: 3px 0; }
  #legend .swatch { width: 12px; height: 12px; border-radius: 2px; flex: none; margin-top: 2px; }
  #legend .legend-text { line-height: 1.3; color: #111827; }
  #legend .legend-hh { color: #6b7280; }
  #legend .legend-score { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  #legend .score-badge {
    display: inline-block; padding: 1px 6px; border-radius: 10px;
    font-size: 11px; font-weight: 600; color: #fff;
  }
  #legend .score-none { color: #9ca3af; font-style: italic; }
  #legend .legend-excluded { color: #9ca3af; font-size: 11px; margin-top: 1px; }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <label for="zipInput">우편번호</label>
    <input id="zipInput" type="text" placeholder="예: 48951, 48952, 48953 (쉼표, 공백, / 로 구분)" />
    <button id="drawBtn">지도에 표시</button>
    <button id="clearBtn">초기화</button>
    <button id="captureBtn" title="클릭 후 브라우저가 물어보는 공유 대상에서 '전체 화면'을 선택하면 캡처됩니다">캡처</button>
    <div id="status"></div>
  </div>
  <div id="map">
    <div id="legend"></div>
  </div>
</div>

<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=cda2e8e8b1a63a98030e01e35c9bd431"></script>
<script>
const map = new kakao.maps.Map(document.getElementById('map'), {
  center: new kakao.maps.LatLng(36.5, 127.8),
  level: 12,
});
window.map = map;

let currentOverlays = [];
const colors = ['#0033ff', '#e11d48', '#059669', '#d97706', '#7c3aed', '#0891b2'];

function normalizeCodes(raw) {
  return raw.split(/[\s,/]+/).map(s => s.trim()).filter(Boolean);
}

function ringToPath(ring) {
  // drop the closing duplicate point; kakao closes the ring automatically
  return ring.slice(0, -1).map(([lon, lat]) => new kakao.maps.LatLng(lat, lon));
}

function entryToPolygonPaths(entry) {
  // returns array of "path" arrays, one per polygon (each path may contain
  // multiple rings: [outer, hole, hole, ...])
  if (entry.type === 'Polygon') {
    return [entry.coordinates.map(ringToPath)];
  }
  // MultiPolygon: array of polygons, each an array of rings
  return entry.coordinates.map(polygon => polygon.map(ringToPath));
}

async function fetchZipEntry(code) {
  const shard = code.slice(0, 2);
  const res = await fetch(`data/${shard}/${code}.json`);
  if (!res.ok) return null;
  return res.json();
}

async function drawZipcodes() {
  const raw = document.getElementById('zipInput').value;
  const codes = normalizeCodes(raw);
  const statusEl = document.getElementById('status');
  if (codes.length === 0) {
    statusEl.textContent = '우편번호를 입력해 주세요.';
    return;
  }

  statusEl.textContent = '조회 중...';

  currentOverlays.forEach(ov => ov.setMap(null));
  currentOverlays = [];

  const bounds = new kakao.maps.LatLngBounds();
  const found = [];
  const notFound = [];
  const legendItems = [];
  let colorIdx = 0;

  const results = await Promise.all(codes.map(async code => {
    const entry = await fetchZipEntry(code);
    return { code, entry };
  }));

  for (const { code, entry } of results) {
    if (!entry) {
      notFound.push(code);
      continue;
    }
    found.push(code);
    const color = colors[colorIdx % colors.length];
    colorIdx++;

    const polygonPaths = entryToPolygonPaths(entry);
    for (const path of polygonPaths) {
      const polygon = new kakao.maps.Polygon({
        path,
        strokeWeight: 4,
        strokeColor: color,
        strokeOpacity: 0.9,
        fillColor: color,
        fillOpacity: 0.15,
      });
      polygon.setMap(map);
      currentOverlays.push(polygon);

      path.forEach(ring => ring.forEach(p => bounds.extend(p)));
    }

    legendItems.push({
      color,
      zipcode: entry.zipcode,
      region: entry.region,
      households: entry.estimated_households,
      score: entry.score,
      ratios: entry.ratios || null,
    });
  }

  if (found.length > 0) {
    map.setBounds(bounds);
  }

  renderLegend(legendItems);

  let msg = `찾음: ${found.length}개`;
  if (notFound.length > 0) {
    msg += ` / <span class="not-found">찾지 못함: ${notFound.join(', ')}</span>`;
  }
  statusEl.innerHTML = msg;
}

// 임시 등급 구간(공식 등급표 확정 전까지의 잠정 기준): 높을수록 유리한 구역
function scoreBadge(score) {
  if (score == null) return null;
  if (score >= 85) return { label: 'S', color: '#059669' };
  if (score >= 70) return { label: 'A', color: '#65a30d' };
  if (score >= 55) return { label: 'B', color: '#d97706' };
  if (score >= 40) return { label: 'C', color: '#ea580c' };
  return { label: 'D', color: '#dc2626' };
}

function renderLegend(items) {
  const legendEl = document.getElementById('legend');
  if (items.length === 0) {
    legendEl.style.display = 'none';
    legendEl.innerHTML = '';
    return;
  }
  const rows = items.map(item => {
    const hh = item.households != null
      ? `<div class="legend-hh">예상 약 ${Math.round(item.households).toLocaleString()}세대</div>`
      : '';
    const badge = scoreBadge(item.score);
    const scoreLine = badge
      ? `<div class="legend-score"><span class="score-badge" style="background:${badge.color}">${badge.label}</span><span>${item.score.toFixed(1)}점</span></div>`
      : `<div class="legend-score score-none">종합점수: 데이터 부족</div>`;
    const r = item.ratios;
    const excludedLine = (r && (r.apt != null || r.officetel != null || r.villa != null || r.jibun != null))
      ? `<div class="legend-excluded">아파트 ${r.apt ?? '-'}% · 오피스텔 ${r.officetel ?? '-'}% · 빌라 ${r.villa ?? '-'}% · 지번 ${r.jibun ?? '-'}%</div>`
      : '';
    return `
      <div class="legend-item">
        <span class="swatch" style="background:${item.color}"></span>
        <div class="legend-text">
          <div>${item.zipcode} (${item.region})</div>
          ${hh}
          ${scoreLine}
          ${excludedLine}
        </div>
      </div>`;
  }).join('');
  legendEl.innerHTML = `<h4>우편번호 구역</h4>${rows}`;
  legendEl.style.display = 'block';
}

document.getElementById('drawBtn').addEventListener('click', drawZipcodes);
document.getElementById('zipInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') drawZipcodes();
});
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('zipInput').value = '';
  document.getElementById('status').textContent = '';
  currentOverlays.forEach(ov => ov.setMap(null));
  currentOverlays = [];
  renderLegend([]);
  map.setCenter(new kakao.maps.LatLng(36.5, 127.8));
  map.setLevel(12);
});

async function captureScreen() {
  const statusEl = document.getElementById('status');
  if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
    alert('이 브라우저는 화면 캡처를 지원하지 않습니다.');
    return;
  }
  let stream;
  try {
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: { displaySurface: 'monitor' },
      audio: false,
    });
  } catch (err) {
    return; // 사용자가 취소함
  }

  const video = document.createElement('video');
  video.srcObject = stream;
  await video.play();
  await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  stream.getTracks().forEach(track => track.stop());

  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const ts = new Date().toISOString().replace(/[:.]/g, '-');
    a.href = url;
    a.download = `우편번호구역_캡처_${ts}.png`;
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');

  statusEl.textContent = '캡처 완료: 다운로드 폴더를 확인하세요.';
}

document.getElementById('captureBtn').addEventListener('click', captureScreen);
</script>
</body>
</html>
